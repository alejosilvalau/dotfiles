set $locker ~/.config/i3/lockscreen.sh
set $refresh_i3status killall -SIGUSR1 i3status

# Lock screen timeout to 5 minutes and use the custom locker command
exec --no-startup-id xautolock -time 5 -locker $locker &
bindsym $mod+Shift+x exec --no-startup-id $locker

# Use Mouse+$mod to drag floating windows to their wanted position
floating_modifier $mod

# Screenshots
bindsym Print exec --no-startup-id flameshot gui
bindsym Shift+Print exec --no-startup-id flameshot screen

# Workspace navigation (Next/Prev on current output)
bindsym $mod+Ctrl+Left workspace prev_on_output
bindsym $mod+Ctrl+Right workspace next_on_output

bindsym $mod+Ctrl+h workspace prev_on_output
bindsym $mod+Ctrl+l workspace next_on_output

# Volume controls
bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +10% && $refresh_i3status
bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -10% && $refresh_i3status
bindsym XF86AudioMute exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle && $refresh_i3status
bindsym XF86AudioMicMute exec --no-startup-id pactl set-source-mute @DEFAULT_SOURCE@ toggle && $refresh_i3status

# Brightness controls
bindsym XF86MonBrightnessUp exec --no-startup-id brightnessctl set +5%
bindsym XF86MonBrightnessDown exec --no-startup-id brightnessctl set 5%-

# Start a terminal
bindsym $mod+Return exec ghostty
bindsym $mod+Shift+Return exec alacritty

# Open Chrome
bindsym $mod+$alt+c exec google-chrome-stable

# Open Rclone Browser
bindsym $mod+$alt+r exec --no-startup-id ~/Applications/rclone-browser-1.8.0-a0b66c6-linux-x86_64_19b798f585da517ed5d4e87d726c604c.AppImage

# Open Nautilus (Files)
bindsym $mod+$alt+f exec nautilus

# Open Obsidian
bindsym $mod+$alt+o exec obsidian

# Compose key for special characters
exec --no-startup-id setxkbmap -option compose:ralt

# Kill focused window
bindsym $mod+Shift+q kill

# Start rofi (a program launcher)
bindsym $mod+space exec --no-startup-id ~/.config/rofi/menu.sh

# Change focus
bindsym $mod+h focus left
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right

bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# Move focused window
bindsym $mod+Shift+h move left
bindsym $mod+Shift+j move down
bindsym $mod+Shift+k move up
bindsym $mod+Shift+l move right

bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# Focus on monitors
bindsym $mod+$alt+h focus output left
bindsym $mod+$alt+l focus output right

bindsym $mod+$alt+Left focus output left
bindsym $mod+$alt+Right focus output right

# Enter fullscreen mode for the focused container
bindsym $mod+f fullscreen toggle

# Change container layout (stacked, tabbed, toggle split)
bindsym $mod+w layout stacking
bindsym $mod+t layout tabbed
bindsym $mod+e layout toggle split

# Split in horizontal orientation
bindsym $mod+s split h

# Split in vertical orientation
bindsym $mod+v split v

# Toggle tiling / floating
bindsym $mod+Shift+d floating toggle

# Change focus between tiling / floating windows
bindsym $mod+d focus mode_toggle

# Focus the parent container
bindsym $mod+p focus parent

# Focus the child container
bindsym $mod+c focus child

# Make the currently focused window a scratchpad window
bindsym $mod+Shift+minus move scratchpad

# Show the first scratchpad window (cycles through them if you have multiple)
bindsym $mod+minus scratchpad show

bindsym $mod+Shift+c exec --no-startup-id ~/.config/i3/assign-workspaces.sh
bindsym $mod+Shift+r restart

# Resize window (you can also use the mouse for that)
mode "resize" {
  bindsym minus resize shrink height 10 px or 10 ppt
  bindsym Shift+equal resize grow height 10 px or 10 ppt
  bindsym Shift+comma resize shrink width 10 px or 10 ppt
  bindsym Shift+period resize grow width 10 px or 10 ppt

  bindsym Up resize shrink height 10 px or 10 ppt
  bindsym Down resize grow height 10 px or 10 ppt
  bindsym Left resize shrink width 10 px or 10 ppt
  bindsym Right resize grow width 10 px or 10 ppt

  bindsym Return mode "default"
  bindsym Escape mode "default"
  bindsym $mod+r mode "default"
}

bindsym $mod+r mode "resize"
