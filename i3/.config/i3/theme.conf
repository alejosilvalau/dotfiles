set $lockscreen_image ~/Pictures/Backgrounds/rebranding-alnixdev-v4.png
set $bg        #1a1b26
set $fg        #c0caf5
set $black     #15161e
set $red       #f7768e
set $green     #9ece6a
set $yellow    #e0af68
set $blue      #7aa2f7
set $magenta   #bb9af7
set $cyan      #7dcfff
set $white     #a9b1d6
set $comment   #565f89
set $border    #3b4261

# Window colors
# target                 title     bg       text     indicator  border
client.focused           $black    $blue    $black   $cyan      $blue
client.focused_inactive  $comment  $bg      $white   $bg        $comment
client.unfocused         $comment  $bg      $comment $bg        $black
client.urgent            $red      $bg      $red     $bg        $red
client.placeholder       $comment  $bg      $white   $bg        $comment
client.background        $bg

# Set the default color theme
exec --no-startup-id xsettingsd
exec --no-startup-id gsettings set org.gnome.desktop.interface gtk-theme 'Yaru-dark'
exec --no-startup-id gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec --no-startup-id dbus-update-activation-environment --systemd --all

# Sets the cursor theme for the X session
exec --no-startup-id gsettings set org.gnome.desktop.interface cursor-theme 'Yaru'

# Set the border width for all windows to 1 pixel
for_window [class="^.*"] border pixel 1 

# Set the wallpaper using nitrogen
exec_always --no-startup-id nitrogen --restore

# Font for window titles and bar
font pango:CaskaydiaMono NFM 14




