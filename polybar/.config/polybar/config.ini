[colors]
; Tokyo Night colors
base = #1a1b26
mantle = #16161e
crust = #13131a
text = #c0caf5
subtext0 = #9aa5ce
subtext1 = #a9b1d6
surface0 = #1f2335
surface1 = #24283b
surface2 = #292e42
overlay0 = #565f89
overlay1 = #6b7089
overlay2 = #7982a9
blue = #7aa2f7
lavender = #b4befe
sapphire = #2ac3de
sky = #7dcfff
teal = #1abc9c
green = #9ece6a
yellow = #e0af68
peach = #ff9e64
maroon = #db4b4b
red = #f7768e
mauve = #bb9af7
pink = #ff007c
flamingo = #ff5370
rosewater = #f7768e
transparent = #00000000

background = ${colors.base}
background-alt = ${colors.blue}
foreground = ${colors.text}
primary = ${colors.blue}
secondary = ${colors.mauve}
alert = ${colors.red}
disabled = ${colors.overlay0}

[bar/toph]
monitor = ${env:MONITOR:}
width = 100%
height = 28pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

bottom = true

line-size = 6pt

border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.overlay0}

font-0 = CaskaydiaMono NFM:size=14;6

modules-left = menu xworkspaces cpu-temperature gpu-temperature
modules-center = date 
modules-right = systray pulseaudio network battery

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/menu]
type = custom/text
content = " 󰀻"
content-foreground = ${colors.mauve}
click-left = $HOME/.config/rofi/menu.sh
click-right = $HOME/.config/rofi/menu.sh

[module/xworkspaces]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true

label-focused = %name%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.base}
label-focused-underline = ${colors.blue}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-padding = 1

label-visible = %name%
label-visible-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 1

date = %d/%m/%Y - %H:%M

label = %date%
label-foreground = ${colors.primary}

[module/cpu-temperature]
type = internal/temperature
interval = 3
thermal-zone = 0
warn-temperature = 90

format =  <label>
format-warn =  <label-warn>
format-foreground = ${colors.primary}
format-warn-foreground = ${colors.alert}

label = CPU %temperature-c%
label-warn = CPU %temperature-c%
label-warn-foreground = ${colors.alert}

[module/gpu-temperature]
type = custom/script
exec = $HOME/.config/polybar/module_gpu_temperature.sh
interval = 3
format-foreground = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.primary}

label-muted = 󰝟 Muted
label-muted-foreground = ${colors.disabled}

click-right = kitty -e pulsemixer

[module/network]
type = custom/script
exec = $HOME/.config/polybar/module_network.sh
interval = 5
format-foreground = ${colors.primary}
click-left = kitty -e wifitui
click-right = kitty -e wifitui

[module/battery]
type = internal/battery
full-at = 100
low-at = 10
battery = BAT0
adapter = ADP0
poll-interval = 5
time-format = %H:%Mh

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%% (%time%)
label-charging-foreground = ${colors.peach}

animation-charging-0 = 󰢜
animation-charging-1 = 󰂆
animation-charging-2 = 󰂇
animation-charging-3 = 󰂈
animation-charging-4 = 󰂅
animation-charging-framerate = 750
animation-charging-foreground = ${colors.peach}

; Discharging: battery level icon + percentage + time remaining
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%% (%time%)

ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁺
ramp-capacity-2 = 󰁻
ramp-capacity-3 = 󰁼
ramp-capacity-4 = 󰁽
ramp-capacity-5 = 󰁾
ramp-capacity-6 = 󰁿
ramp-capacity-7 = 󰂀
ramp-capacity-8 = 󰂁
ramp-capacity-9 = 󰂂
ramp-capacity-10 = 󰁹
ramp-capacity-foreground = ${colors.primary}

; Full
format-full = <label-full>
label-full = 󰁹 Full
label-full-foreground = ${colors.green}

; Low battery warning
format-low = <ramp-capacity> <label-low>
label-low = %percentage%% (%time%) !
label-low-foreground = ${colors.alert}

[settings]
screenchange-reload = true
pseudo-transparency = true
enable-ipc = true
